services:
  - type: web
    name: payroll-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # fill in manually in Render dashboard
      - key: SECRET_KEY
        sync: false
